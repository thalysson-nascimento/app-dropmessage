<section class="profile-skeleton">
  <!-- CONTENT -->
  <div class="profile-skeleton__content">
    <!-- HEADER -->
    <div class="profile-skeleton__header">
      <div class="profile-skeleton__header-info">
        <div class="profile-skeleton__title skeleton"></div>
        <div class="profile-skeleton__badge skeleton"></div>
      </div>

      <div class="profile-skeleton__action">
        <div class="profile-skeleton__action-icon skeleton"></div>
      </div>
    </div>

    <!-- BIO -->
    <section class="profile-skeleton__section">
      <div class="profile-skeleton__section-title skeleton"></div>

      <div class="profile-skeleton__text">
        <div class="profile-skeleton__line skeleton"></div>
        <div
          class="profile-skeleton__line profile-skeleton__line--90 skeleton"
        ></div>
        <div
          class="profile-skeleton__line profile-skeleton__line--60 skeleton"
        ></div>
      </div>
    </section>

    <!-- INTERESTS -->
    <section class="profile-skeleton__section">
      <div
        class="profile-skeleton__section-title profile-skeleton__section-title--medium skeleton"
      ></div>

      <div class="profile-skeleton__chips">
        <div class="profile-skeleton__chip skeleton"></div>
        <div
          class="profile-skeleton__chip profile-skeleton__chip--medium skeleton"
        ></div>
        <div
          class="profile-skeleton__chip profile-skeleton__chip--small skeleton"
        ></div>
      </div>
    </section>

    <hr class="profile-skeleton__divider" />

    <!-- DETAILS -->
    <section class="profile-skeleton__section">
      <div
        class="profile-skeleton__section-title profile-skeleton__section-title--large skeleton"
      ></div>

      <div class="profile-skeleton__details">
        <div class="profile-skeleton__detail-row">
          <div class="profile-skeleton__detail-left">
            <div class="profile-skeleton__icon skeleton"></div>
            <div class="profile-skeleton__small-line skeleton"></div>
          </div>
          <div class="profile-skeleton__value skeleton"></div>
        </div>

        <div class="profile-skeleton__detail-row">
          <div class="profile-skeleton__detail-left">
            <div class="profile-skeleton__icon skeleton"></div>
            <div class="profile-skeleton__small-line skeleton"></div>
          </div>
          <div
            class="profile-skeleton__value profile-skeleton__value--small skeleton"
          ></div>
        </div>

        <div class="profile-skeleton__detail-row">
          <div class="profile-skeleton__detail-left">
            <div class="profile-skeleton__icon skeleton"></div>
            <div
              class="profile-skeleton__small-line profile-skeleton__small-line--wide skeleton"
            ></div>
          </div>
          <div
            class="profile-skeleton__value profile-skeleton__value--wide skeleton"
          ></div>
        </div>
      </div>
    </section>
  </div>
</section>
