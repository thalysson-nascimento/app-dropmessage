<div class="content">
  <div class="header">
    <app-logo-dropmessage [fontSize]="'1rem'"></app-logo-dropmessage>
    <div>
      <img
        src="assets/icon-static/camera-bottomsheet.svg"
        class="icon-camera"
        alt="camera"
        (click)="goToTakePicture()"
      />
    </div>
  </div>

  @if (loading) {
  <div class="loading-container">
    <app-card-loading-shimmer>
      <div class="header-loading-shimmer">
        <app-load-shimmer
          duration="0.7s"
          height="30px"
          width="60px"
        ></app-load-shimmer>
      </div>

      <div class="bottom-loadd-shimmer">
        <app-load-shimmer
          duration="1s"
          height="50px"
          width="50%"
        ></app-load-shimmer>
        <app-load-shimmer duration="1.3s" height="50px"></app-load-shimmer>
      </div>
    </app-card-loading-shimmer>
  </div>
  }@else if(error) {
  <app-error-request>
    <button appButton="info" (click)="goToIAProfile()">Tentar novamente</button>
  </app-error-request>
  } @else {
  <div class="main-content">
    <app-cards
      name="Vanessa"
      userProfile="Ousada"
      image="assets/images/ia-vanessa.png"
      badge=".IA"
    ></app-cards>

    <div class="card-explorer-ia">
      <div class="contain-description">
        <p class="contain-description-title">
          Não encontramos novos perfis agora.
        </p>
        <span
          >Aproveite os perfis de IA criados para conversas de experiências
          únicas.</span
        >
      </div>
      <div class="contain-button">
        <button appButton (click)="goToIAProfile()">
          Explorar perfil de IA
        </button>
      </div>
    </div>
  </div>
  }
</div>
