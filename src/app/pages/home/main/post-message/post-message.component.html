@if (showRewardCard) {
<app-admob-video-reward (close)="closeVideoReward()"></app-admob-video-reward>
} @if (showCard) {
<app-like-limite-reward
  (closeCard)="closeCard()"
  (openReward)="openVideoReward()"
></app-like-limite-reward>
}

<div class="content">
  <div class="header">
    <app-logo-dropmessage [fontSize]="'1rem'"></app-logo-dropmessage>
    <div>
      <img
        src="assets/icon-static/camera-bottomsheet.svg"
        class="icon-camera"
        alt="camera"
        (click)="goToTakePicture()"
      />
    </div>
  </div>

  @if (loading) {
  <div class="loading-container">
    <app-card-loading-shimmer>
      <div class="header-loading-shimmer">
        <app-load-shimmer
          duration="0.7s"
          height="30px"
          width="60px"
        ></app-load-shimmer>
      </div>

      <div class="bottom-loadd-shimmer">
        <app-load-shimmer
          duration="1s"
          height="50px"
          width="50%"
        ></app-load-shimmer>
        <app-load-shimmer duration="1.3s" height="50px"></app-load-shimmer>
      </div>
    </app-card-loading-shimmer>
  </div>
  }@else if(error) {
  <app-error-request>
    <button appButton="info" (click)="goToIAProfile()">
      {{ "button.tryAgain" | translate }}
    </button>
  </app-error-request>
  } @else {
  <div class="main-content">
    @if (postMessage.type.includes('AI_SUGGESTION')) {
    <app-swiper-container
      [feedPostCard]="postMessage.items"
      [profileAI]="profileAI"
      (closeAdmobModalReward)="closeAdmobModalReward()"
    ></app-swiper-container>
    } @else if (postMessage.type.includes('POST')) {
    <app-swiper-container
      [feedPostCard]="postMessage.items"
      [profileAI]="profileAI"
      (closeAdmobModalReward)="closeAdmobModalReward()"
    ></app-swiper-container>
    }
  </div>
  }
</div>
