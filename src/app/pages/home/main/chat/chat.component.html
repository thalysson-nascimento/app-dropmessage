<div class="content">
  <div class="header">
    <app-logo-dropmessage [fontSize]="'1rem'"></app-logo-dropmessage>
  </div>

  <div class="container-title-subtitle">
    <h1 class="title">Chat</h1>
    <p class="subtitle">Share a moment that lasts for a limited time</p>
  </div>

  @if(loading) {
  <div class="loading-container"></div>
  } @else if(error) {
  <app-error-request>
    <button appButton="info">Tentar novamente</button>
  </app-error-request>
  } @else { }
</div>
