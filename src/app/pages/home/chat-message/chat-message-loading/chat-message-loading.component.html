<div class="chat-loading">
  <!-- HEADER -->
  <header class="chat-loading__header">
    <div class="chat-loading__header-left">
      <div class="chat-loading__avatar chat-loading__skeleton"></div>

      <div class="chat-loading__user">
        <div
          class="chat-loading__line chat-loading__line--title chat-loading__skeleton"
        ></div>
        <div
          class="chat-loading__line chat-loading__line--status chat-loading__skeleton"
        ></div>
      </div>
    </div>

    <div class="chat-loading__icon chat-loading__skeleton"></div>
  </header>

  <!-- CONTENT -->
  <main class="chat-loading__content">
    <!-- Date divider -->
    <div class="chat-loading__divider">
      <div
        class="chat-loading__line chat-loading__line--date chat-loading__skeleton"
      ></div>
    </div>

    <!-- Incoming -->
    <div class="chat-loading__message chat-loading__message--incoming">
      <div
        class="chat-loading__avatar chat-loading__avatar--small chat-loading__skeleton"
      ></div>

      <div class="chat-loading__bubble-group">
        <div
          class="chat-loading__bubble chat-loading__bubble--incoming chat-loading__skeleton"
        ></div>
        <div
          class="chat-loading__line chat-loading__line--meta chat-loading__skeleton"
        ></div>
      </div>
    </div>

    <!-- Outgoing -->
    <div class="chat-loading__message chat-loading__message--outgoing">
      <div
        class="chat-loading__bubble chat-loading__bubble--outgoing chat-loading__skeleton"
      ></div>
      <div
        class="chat-loading__line chat-loading__line--meta chat-loading__skeleton"
      ></div>
    </div>

    <!-- Incoming short -->
    <div class="chat-loading__message chat-loading__message--incoming">
      <div
        class="chat-loading__avatar chat-loading__avatar--small chat-loading__skeleton"
      ></div>

      <div class="chat-loading__bubble-group">
        <div
          class="chat-loading__bubble chat-loading__bubble--incoming short chat-loading__skeleton"
        ></div>
      </div>
    </div>

    <!-- Outgoing group -->
    <div class="chat-loading__message chat-loading__message--outgoing column">
      <div
        class="chat-loading__bubble chat-loading__bubble--outgoing small chat-loading__skeleton"
      ></div>
      <div
        class="chat-loading__bubble chat-loading__bubble--outgoing smaller chat-loading__skeleton"
      ></div>
      <div
        class="chat-loading__line chat-loading__line--meta chat-loading__skeleton"
      ></div>
    </div>

    <!-- Incoming long -->
    <div class="chat-loading__message chat-loading__message--incoming">
      <div
        class="chat-loading__avatar chat-loading__avatar--small chat-loading__skeleton"
      ></div>

      <div class="chat-loading__bubble-group">
        <div
          class="chat-loading__bubble chat-loading__bubble--incoming long chat-loading__skeleton"
        ></div>
      </div>
    </div>
  </main>

  <!-- INPUT -->
  <div class="chat-loading__input">
    <div class="chat-loading__input-container">
      <div class="chat-loading__icon-small chat-loading__skeleton"></div>

      <div class="chat-loading__input-field chat-loading__skeleton"></div>

      <div class="chat-loading__icon-small chat-loading__skeleton"></div>

      <div class="chat-loading__send chat-loading__skeleton"></div>
    </div>
  </div>
</div>
