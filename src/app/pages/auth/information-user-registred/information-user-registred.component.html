<div class="contain">
  <div class="contain-svg">
    <img src="assets/icon-static/completd-profile.svg" alt="" />
  </div>

  <div class="contain-text">
    <h1>{{ "text.profileCreatedSuccess" | translate }}</h1>

    <p>{{ "text.backToLogin" | translate }}</p>
  </div>

  <div class="contain-button">
    <button appButtonStyle [buttonType]="'secondary'" (click)="goToLogin()">
      {{ "button.goToLogin" | translate }}
    </button>
  </div>
</div>
