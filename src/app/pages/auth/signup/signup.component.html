<div class="contain-sign">
  <div class="contain-back-button">
    <img
      src="assets/icon-static/arrow-left.svg"
      (click)="goToAuthSign()"
      alt=""
    />
  </div>

  <div class="icon-relationcip">
    <img
      src="assets/icon-static/icon-relationchip-register.svg"
      alt="ilustracao de duas pessoas se abraçando. Mulher de cabelos longos abraçada suavemente com rapaz de cabelo curto sem barba"
    />
  </div>

  <p class="text-login">{{ "text.titleCreateAccount" | translate }}</p>

  <div class="contain-button-google">
    <button
      class="button-google"
      (click)="createAccountWithGoogle()"
      [disabled]="isLoadingButtonGoogleOAuth"
    >
      @if (isLoadingButtonGoogleOAuth) {
      <app-spinner color="#666" backgroundColor="#999"></app-spinner>
      }@else {
      <img src="assets/icon-static/logo-google.svg" alt="" />
      <span>{{ "button.accessWithGoogle" | translate }}</span>
      }
    </button>

    <p>{{ "or" | translate }}</p>
  </div>

  <form
    [formGroup]="createAccountFormGroup"
    (submit)="createAccountUser()"
    class="contain-form-login"
    class="contain-form-login"
  >
    <input
      type="text"
      [placeholder]="'input.placeholder.name' | translate"
      id="name"
      appInputCustom
      formControlName="name"
      maxlength="30"
      class="input-custom"
    />
    <input
      type="email"
      [placeholder]="'input.placeholder.email' | translate"
      id="email"
      appInputCustom
      formControlName="email"
      class="input-custom"
      style="text-transform: lowercase"
    />
    <input
      type="password"
      [placeholder]="'input.placeholder.password' | translate"
      id=""
      appInputCustom
      formControlName="password"
      class="input-custom"
    />
    <button
      appButton
      type="submit"
      class="button-create-acount"
      [disabled]="buttonDisalbled || createAccountFormGroup.invalid"
      aria-label="criar conta"
    >
      @if (isLoadingButton) {
      <app-spinner></app-spinner>
      }@else {
      <span>{{ "button.buttonCreateAccount" | translate }}</span>
      }
    </button>
  </form>

  <div class="contain-privece-police">
    <p class="privece-police">
      {{ "text.registrationAgree" | translate }}
      <span class="privece-police-hilite" (click)="goToPrivecePolice()">{{
        "text.politicsPrivacy" | translate
      }}</span>
    </p>
  </div>
</div>

<app-modal #modalSuccess>
  <app-feedback-overlay
    variant="success"
    icon="celebration"
    [title]="'text.createAccountSuccess' | translate"
    [description]="'text.descriptionCreateAccountSuccess' | translate"
  ></app-feedback-overlay>

  <button appButton (click)="goToAuthSign()">
    {{ "button.goToLogin" | translate }}
  </button>
</app-modal>

<app-modal #modalError>
  <app-feedback-overlay
    variant="error"
    [title]="'text.errorSomethingWentWrong' | translate"
    [description]="errorMessage"
  ></app-feedback-overlay>

  <button appButton (click)="tryAgain()">
    {{ "button.tryAgain" | translate }}
  </button>
  <button
    appButton="ghost"
    class="btn-ghost"
    variant="ghost"
    (click)="closeModal()"
  >
    {{ "button.cancel" | translate }}
  </button>
</app-modal>
