<div
  class="duration-option"
  [class.duration-option--selected]="selected && !disabled"
  [class.duration-option--disabled]="disabled"
  (click)="onSelect()"
>
  <span
    class="material-symbols-outlined icon"
    [style.color]="disabled ? '#9ca3af' : selected ? option.color : '#9ca3af'"
  >
    {{ option.icon }}
  </span>

  <div class="text">
    <p class="label">{{ option.label }}</p>
    <span class="description">{{ option.description }}</span>
  </div>

  @if (selected && !disabled) {
  <div class="check">
    <span class="material-symbols-outlined">check</span>
  </div>
  }
</div>
