<div class="contain-system-unavailable">
  <p class="title-system-unavailable">
    {{ "text.systemUnavailable" | translate }}
  </p>

  <div class="contain-icon-animation">
    <div id="lottie-icon-system-unavailable" class="icon-animation"></div>
  </div>

  <p>
    {{ infoMessage }}
  </p>

  <div class="contain-button-system-unavailable">
    <button
      appButtonStyle
      [buttonType]="'secondary'"
      (click)="tryAgainLoadingPostMessage()"
    >
      {{ "button.tryAgain" | translate }}
    </button>
  </div>
</div>
